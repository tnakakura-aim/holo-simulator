    // ===== モバイル専用: 深度マップ平滑化 =====
    // Dilation + ダウンサンプリングでExtrusion Artifactを除去
    // PCはapplyDepthDilationをそのまま使用（品質維持）
    // 深度マップのコントラスト圧縮（モバイル用）
    // 深度値の極端な0/255を中間値に寄せて「崖」の高さを均一に抑制
    // 黒いパーツ等のAI誤判断による急激な歪みを緩和する
    // 深度マップの端ピクセル平均を計算（シェーダーのanchorDepth用）
    function calcEdgeDepthAverage(ctx, w, h) {
        const margin = 4; // 端から4px
        const imgData = ctx.getImageData(0, 0, w, h);
        const d = imgData.data;
        let sum = 0, count = 0;
        for (let x = 0; x < w; x++) {
            for (let y = 0; y < margin; y++) { sum += d[(y * w + x) * 4]; count++; }
            for (let y = h - margin; y < h; y++) { sum += d[(y * w + x) * 4]; count++; }
        }
        for (let y = margin; y < h - margin; y++) {
            for (let x = 0; x < margin; x++) { sum += d[(y * w + x) * 4]; count++; }
            for (let x = w - margin; x < w; x++) { sum += d[(y * w + x) * 4]; count++; }
        }
        return count > 0 ? (sum / count) / 255 : 0.5;
    }

    function compressDepthRange(ctx, canvas, minVal = 80, maxVal = 200) {
        const w = canvas.width, h = canvas.height;
        const imgData = ctx.getImageData(0, 0, w, h);
        const d = imgData.data;
        const range = maxVal - minVal;
        for (let i = 0; i < d.length; i += 4) {
            const v = d[i]; // R=G=B（グレースケール深度マップ）
            d[i] = d[i+1] = d[i+2] = Math.round(minVal + (v / 255) * range);
        }
        ctx.putImageData(imgData, 0, 0);
    }

    function smoothAndAnchorDepth(ctx, canvas, isChar) {
        const w = 960, h = 600;
        const tmp = document.createElement('canvas');
        tmp.width = w; tmp.height = h;
        const tCtx = tmp.getContext('2d');
        tCtx.drawImage(canvas, 0, 0);
        tCtx.globalCompositeOperation = 'lighten';
        const radius = isChar ? 28 : 16;
        const dirs = 16;
        for (let i = 0; i < dirs; i++) {
            const angle = (i / dirs) * Math.PI * 2;
            tCtx.drawImage(canvas, Math.cos(angle) * radius, Math.sin(angle) * radius);
        }
        const tinyW = isChar ? 30 : 48;
        const tinyH = isChar ? 19 : 30;
        const tiny = document.createElement('canvas');
        tiny.width = tinyW; tiny.height = tinyH;
        const tCtx2 = tiny.getContext('2d');
        tCtx2.imageSmoothingEnabled = true;
        tCtx2.drawImage(tmp, 0, 0, tinyW, tinyH);
        ctx.clearRect(0, 0, w, h);
        ctx.globalCompositeOperation = 'source-over';
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(tiny, 0, 0, w, h);
    }

        // ===== 深度マップ膨張処理（Dilation）=====
    // Geminiの指摘: キャラシルエット境界の「崖ポリゴン」に輪郭ピクセルが
    // 引き伸ばされてトゲになるExtrusion Artifactの根本対策
    // 深度マップを外側に膨張させて「崖」を透明エリアに追い出す
    // → 崖ポリゴンのテクセルがalpha=0になりalphaTestで破棄される
    function applyDepthDilation(ctx, canvas) {
        const radius = 12; // 960px空間での膨張半径（モバイルは大きめ）
        const w = canvas.width, h = canvas.height;
        const tmp = document.createElement('canvas');
        tmp.width = w; tmp.height = h;
        const tCtx = tmp.getContext('2d');
        // ベースをコピー
        tCtx.drawImage(canvas, 0, 0);
        // 12方向にオフセット描画、lighten合成（各チャンネルmax）= Dilation
        tCtx.globalCompositeOperation = 'lighten';
        const dirs = 12;
        for (let i = 0; i < dirs; i++) {
            const angle = (i / dirs) * Math.PI * 2;
            const dx = Math.round(Math.cos(angle) * radius);
            const dy = Math.round(Math.sin(angle) * radius);
            tCtx.drawImage(canvas, dx, dy);
        }
        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(tmp, 0, 0);
    }

        // ===== 深度マップ端クランプ =====
    // 変位マップの外縁ピクセルが非ゼロだとカード輪郭の頂点が外側に飛び出してガタガタになる
    // 端へ向かうほど深度値を 0 に落とすマスクを multiply 合成する
    function applyDepthEdgeMask(ctx, canvas, margin = 80) {
        // margin: canvasの端からフェードさせる幅（960px空間）
        // 大きいmargin → 中央だけ盛り上がる「椀型」になる
        // 小さいmargin（8程度） → メッシュ端の崖だけ消す
        const maskCvs = document.createElement('canvas');
        maskCvs.width = 960; maskCvs.height = 600;
        const mCtx = maskCvs.getContext('2d');
        // 黒塗りつぶし → 中央白矩形 → ブラーで端をなだらか
        mCtx.fillStyle = '#000';
        mCtx.fillRect(0, 0, 960, 600);
        mCtx.fillStyle = '#fff';
        mCtx.fillRect(margin, margin, 960 - margin * 2, 600 - margin * 2);
        const blurCvs = document.createElement('canvas');
        blurCvs.width = 960; blurCvs.height = 600;
        const bCtx = blurCvs.getContext('2d');
        bCtx.filter = `blur(${margin * 0.55}px)`;
        bCtx.drawImage(maskCvs, 0, 0);
        // multiply: 端の深度値を 0 に落とす
        ctx.globalCompositeOperation = 'multiply';
        ctx.drawImage(blurCvs, 0, 0);
        ctx.globalCompositeOperation = 'source-over';
    }

    function generateSyntheticDepth3D() {
        if (!three3D) return;
        const { depthCtx3D, depthCanvas3D, depthTexture } = three3D;
        depthCtx3D.clearRect(0, 0, 960, 600);
        if (originalImageData) {
            const d = originalImageData.data;
            const imgData = depthCtx3D.createImageData(960, 600);
            const out = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                if (d[i + 3] < 10) { out[i] = out[i+1] = out[i+2] = 0; out[i+3] = 255; continue; }
                const lum = d[i] * 0.3 + d[i + 1] * 0.59 + d[i + 2] * 0.11;
                const idx4 = i >> 2;
                const x = (idx4 % 960 - 480) / 480, y = (Math.floor(idx4 / 960) - 300) / 300;
                const centerBias = Math.max(0, 1 - Math.sqrt(x * x + y * y) * 0.65) * 55;
                const val = Math.min(255, lum * 0.55 + centerBias);
                out[i] = out[i+1] = out[i+2] = val; out[i+3] = 255;
            }
            depthCtx3D.putImageData(imgData, 0, 0);
        } else {
            const grad = depthCtx3D.createRadialGradient(480, 300, 0, 480, 300, 520);
            grad.addColorStop(0, '#fff'); grad.addColorStop(1, '#111');
            depthCtx3D.fillStyle = grad; depthCtx3D.fillRect(0, 0, 960, 600);
        }
        const tmp = document.createElement('canvas'); tmp.width = 960; tmp.height = 600;
        const tCtx = tmp.getContext('2d');
        tCtx.filter = 'blur(8px)'; tCtx.drawImage(depthCanvas3D, 0, 0);
        depthCtx3D.clearRect(0, 0, 960, 600); depthCtx3D.drawImage(tmp, 0, 0);
        if (_isMobilePerf) { smoothAndAnchorDepth(depthCtx3D, depthCanvas3D, false); compressDepthRange(depthCtx3D, depthCanvas3D); }
        else applyDepthDilation(depthCtx3D, depthCanvas3D);
        depthTexture.needsUpdate = true;
        if (three3D?.material?._bgTiltUniforms) three3D.material._bgTiltUniforms.uAnchorDepth.value = calcEdgeDepthAverage(depthCtx3D, 960, 600);
    }

    function applyAIDepth3D() {
        if (!three3D || !rawDepthData3D) return;
        const { depthCtx3D, depthCanvas3D, depthTexture } = three3D;
        const imgData = depthCtx3D.createImageData(960, 600);
        imgData.data.set(rawDepthData3D);
        depthCtx3D.putImageData(imgData, 0, 0);
        const tmp = document.createElement('canvas'); tmp.width = 960; tmp.height = 600;
        const tCtx = tmp.getContext('2d');
        tCtx.filter = 'blur(4px)'; tCtx.drawImage(depthCanvas3D, 0, 0);
        depthCtx3D.clearRect(0, 0, 960, 600); depthCtx3D.drawImage(tmp, 0, 0);
        if (_isMobilePerf) { smoothAndAnchorDepth(depthCtx3D, depthCanvas3D, false); compressDepthRange(depthCtx3D, depthCanvas3D); }
        else applyDepthDilation(depthCtx3D, depthCanvas3D);
        depthTexture.needsUpdate = true;
        if (three3D?.material?._bgTiltUniforms) three3D.material._bgTiltUniforms.uAnchorDepth.value = calcEdgeDepthAverage(depthCtx3D, 960, 600);
    }

    function generateSyntheticCharDepth3D() {
        if (!three3D) return;
        const { charDepthCtx3D, charDepthCanvas3D, charDepthTexture } = three3D;
        charDepthCtx3D.clearRect(0, 0, 960, 600);
        if (charImage) {
            // BGと完全同一パイプライン: lum*0.55 + centerBias*55
            // 透明PNG対策: alpha<0.1のピクセルは深度=0（スパイク防止）
            // Dilationが崖ポリゴンを透明エリアへ押し出しExtrusion Artifactを解消（BGと同じ仕組み）
            const tmp = document.createElement('canvas'); tmp.width = 960; tmp.height = 600;
            tmp.getContext('2d').drawImage(charImage, charImageRect.x, charImageRect.y, charImageRect.w, charImageRect.h);
            const d = tmp.getContext('2d', { willReadFrequently: true }).getImageData(0, 0, 960, 600).data;
            const imgData = charDepthCtx3D.createImageData(960, 600);
            const out = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                const a = d[i + 3] / 255;
                // alpha<0.1は透明エリア → 深度0（Dilationで崖が透明エリアへ移動するため機能する）
                if (a < 0.1) { out[i] = out[i+1] = out[i+2] = 0; out[i+3] = 255; continue; }
                const lum = d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11;
                const idx4 = i >> 2;
                const x = (idx4 % 960 - 480) / 480, y = (Math.floor(idx4 / 960) - 300) / 300;
                const centerBias = Math.max(0, 1 - Math.sqrt(x * x + y * y) * 0.65) * 55;
                const val = Math.min(255, lum * 0.55 + centerBias);
                out[i] = out[i+1] = out[i+2] = val; out[i+3] = 255;
            }
            charDepthCtx3D.putImageData(imgData, 0, 0);
        } else {
            const grad = charDepthCtx3D.createRadialGradient(480, 300, 0, 480, 300, 460);
            grad.addColorStop(0, '#ddd'); grad.addColorStop(1, '#222');
            charDepthCtx3D.fillStyle = grad; charDepthCtx3D.fillRect(0, 0, 960, 600);
        }
        // BGと同じ: blur → Dilation（崖を透明エリアへ）
        const blurTmp = document.createElement('canvas'); blurTmp.width = 960; blurTmp.height = 600;
        blurTmp.getContext('2d').filter = 'blur(8px)';
        blurTmp.getContext('2d').drawImage(charDepthCanvas3D, 0, 0);
        charDepthCtx3D.clearRect(0, 0, 960, 600); charDepthCtx3D.drawImage(blurTmp, 0, 0);
        if (_isMobilePerf) { smoothAndAnchorDepth(charDepthCtx3D, charDepthCanvas3D, true); compressDepthRange(charDepthCtx3D, charDepthCanvas3D, 80, 200); }
        else applyDepthDilation(charDepthCtx3D, charDepthCanvas3D);
        charDepthTexture.needsUpdate = true;
    }

    let _lastAnimTs = 0;
    function threeAnimate() {
        if (!is3D || !three3D) return;
        // デルタタイムベースの lerp — fpsに関係なく一定「実時間」で追従する
        const now = performance.now();
        const dt = Math.min((now - (_lastAnimTs || now)) / 1000, 0.05); // 上限 50ms
        _lastAnimTs = now;
        const alpha = Math.min(
            dt > 0 ? 1 - Math.exp(-dt * 7) : 0.12,
            gyroEnabled ? 0.5 : 0.18
        );
        const gyroSign = gyroEnabled ? -1 : 1;
        // モバイルは傾き感度1.3倍（より大きく傾くことで立体感が視認しやすくなる）
        const _tMul = _isMobilePerf ? 1.3 : 1.0;
        const tRY = gyroEnabled ? gyroSign * currentTiltX * 0.45 * _tMul : currentTiltX * 0.45 * _tMul;
        const tRX = gyroEnabled ? gyroSign * currentTiltY * 0.28 * _tMul : currentTiltY * 0.28 * _tMul;
        // BGはジャイロ時はcharの40%だけ動かす（立体感を感じつつ背景として安定）
        if (!gyroEnabled) {
            three3D.mesh.rotation.y += (tRY - three3D.mesh.rotation.y) * alpha;
            three3D.mesh.rotation.x += (tRX - three3D.mesh.rotation.x) * alpha;
            // マウス時はシェーダー視差なし
            if (three3D.material._bgTiltUniforms) {
                three3D.material._bgTiltUniforms.uTiltX.value += (0 - three3D.material._bgTiltUniforms.uTiltX.value) * alpha;
                three3D.material._bgTiltUniforms.uTiltY.value += (0 - three3D.material._bgTiltUniforms.uTiltY.value) * alpha;
            }
        } else {
            // ジャイロ時はBG完全固定（即時0）
            three3D.mesh.rotation.y = 0;
            three3D.mesh.rotation.x = 0;
            if (three3D.material._bgTiltUniforms) {
                three3D.material._bgTiltUniforms.uTiltX.value += (gyroSign * currentTiltX - three3D.material._bgTiltUniforms.uTiltX.value) * alpha;
                three3D.material._bgTiltUniforms.uTiltY.value += (-gyroSign * currentTiltY - three3D.material._bgTiltUniforms.uTiltY.value) * alpha;
            }
        }
        three3D.mesh.position.x += (0 - three3D.mesh.position.x) * alpha;
        three3D.mesh.position.y += (0 - three3D.mesh.position.y) * alpha;
        three3D.camera.position.x += (0 - three3D.camera.position.x) * alpha;
        three3D.camera.position.y += (0 - three3D.camera.position.y) * alpha;
        three3D.camera.lookAt(0, 0, 0);
        three3D.charMesh.rotation.y += (tRY - three3D.charMesh.rotation.y) * alpha;
        three3D.charMesh.rotation.x += (tRX - three3D.charMesh.rotation.x) * alpha;

        // モバイルは変位スケールを1.5倍に強化（FOV=30+CSSkで端クリップ済みのため安全）
        const _dMul     = _isMobilePerf ? 0.4 : 1.0; // BG: モバイルは40%で境界崖を抑制
        const _dMulChar = _isMobilePerf ? 0.75 : 1.0; // char: モバイルは75%
        three3D.material.displacementScale     = DISP_SCALE[current3DDepthKey]     * _dMul;
        three3D.charMaterial.displacementScale = DISP_SCALE[currentChar3DDepthKey] * _dMulChar;
        // 視差: モバイルは1.5倍オフセットで浮き上がり感を強調
        const _pMul = _isMobilePerf ? 1.5 : 1.0;
        const tPX = gyroSign * currentTiltX * charState.depth * 0.6 * _pMul;
        const tPY = gyroSign * -currentTiltY * charState.depth * 0.4 * _pMul;
        three3D.charMesh.position.x += (tPX - three3D.charMesh.position.x) * alpha;
        three3D.charMesh.position.y += (tPY - three3D.charMesh.position.y) * alpha;
        three3D.charMesh.position.z = charState.depth * 1.2 * _pMul;

        // 単一シーン描画: char は depthTest:false, depthWrite:false で常にBGの上に
        // renderOrder=1 で char が BG(renderOrder=0) の後に描画される
        three3D.renderer.render(three3D.scene, three3D.camera);
        three3DAnimId = requestAnimationFrame(threeAnimate);
    }

    // AI深度（自動適用）
    let _aiDepthReady = false, _aiDepthEstimator = null, _pendingAIImg = null, _pendingAICharImg = null;
    let rawCharDepthData3D = null;
    let charAIDepthNativeCanvas = null;  // AI深度をキャラ画像ネイティブサイズで保持（位置再投影用）
    (async function () {
        try {
            const { pipeline, env } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0');
            env.allowLocalModels = false;
            env.backends.onnx.wasm.numThreads = 1;
            _aiDepthEstimator = await pipeline('depth-estimation', 'onnx-community/depth-anything-v2-small');
            _aiDepthReady = true;
            if (_pendingAIImg)     { applyAIDepthFromImage(_pendingAIImg);         _pendingAIImg = null; }
            if (_pendingAICharImg) { applyAIDepthFromCharImage(_pendingAICharImg); _pendingAICharImg = null; }
        } catch (e) { console.warn('AI depth init failed:', e); }
    })();

    async function applyAIDepthFromImage(img) {
        if (!_aiDepthReady || !_aiDepthEstimator) { _pendingAIImg = img; return; }
        if (!three3D) { _pendingAIImg = img; return; }
        const statusEl = document.getElementById('aiStatus3D');
        if (statusEl) { statusEl.style.display = 'block'; statusEl.textContent = 'BG AI深度解析中...'; }
        try {
            const aiW = 512, aiH = 320;  // モバイルもPCと同解像度でAI解析（深度品質をパリティ化）
            const tmpCvs = document.createElement('canvas'); tmpCvs.width = aiW; tmpCvs.height = aiH;
            tmpCvs.getContext('2d').drawImage(
                img,
                imageRect.x * aiW / 960, imageRect.y * aiH / 600,
                imageRect.w * aiW / 960, imageRect.h * aiH / 600
            );
            const result = await _aiDepthEstimator(tmpCvs.toDataURL('image/jpeg', 0.85));
            const aiDepthCvs = result.depth.toCanvas();
            const outCvs = document.createElement('canvas'); outCvs.width = 960; outCvs.height = 600;
            outCvs.getContext('2d').drawImage(aiDepthCvs, 0, 0, 960, 600);
            rawDepthData3D = new Uint8ClampedArray(outCvs.getContext('2d').getImageData(0, 0, 960, 600).data);
            applyAIDepth3D();
            if (statusEl) { statusEl.textContent = '✅ BG AI深度完了'; setTimeout(() => { statusEl.style.display = 'none'; }, 1500); }
        } catch (e) { console.warn('AI depth err:', e); if (statusEl) statusEl.style.display = 'none'; }
    }

    // キャラ深度マップを現在の charImageRect に合わせて charDepthCanvas3D へ投影
    function positionCharDepth() {
        if (!three3D) return;
        const { charDepthCtx3D, charDepthCanvas3D, charDepthTexture } = three3D;
        charDepthCtx3D.clearRect(0, 0, 960, 600);
        if (charAIDepthNativeCanvas && charImage) {
            charDepthCtx3D.drawImage(
                charAIDepthNativeCanvas,
                charImageRect.x, charImageRect.y, charImageRect.w, charImageRect.h
            );
            // シルエット外マスク（透明PNGのみ有効。不透明画像は全ピクセルalpha=255のため影響なし）
            charDepthCtx3D.globalCompositeOperation = 'destination-in';
            const maskTmp = document.createElement('canvas'); maskTmp.width = 960; maskTmp.height = 600;
            maskTmp.getContext('2d').drawImage(charImage, charImageRect.x, charImageRect.y, charImageRect.w, charImageRect.h);
            charDepthCtx3D.drawImage(maskTmp, 0, 0);
            charDepthCtx3D.globalCompositeOperation = 'source-over';
        }
        // ===== alpha=255 強制 =====
        // destination-in後、charImageRect外はalpha=0になる
        // blur(CSS filter)はalpha=0隣接ピクセルとプリマルチプライ合成するため
        // エッジ付近のdepth値が減少する → 機首など画像端のdepthが低下 → 埋まる原因
        // → depth値があるピクセル(R>0)はalpha=255に強制し、BGと同条件でblurをかける
        const rawId = charDepthCtx3D.getImageData(0, 0, 960, 600);
        const rd = rawId.data;
        for (let i = 0; i < rd.length; i += 4) {
            if (rd[i] > 0 || rd[i+1] > 0 || rd[i+2] > 0) rd[i+3] = 255;
        }
        charDepthCtx3D.putImageData(rawId, 0, 0);
        // blur（alpha=255統一後なのでエッジ暗化が発生しない）
        const blurTmp = document.createElement('canvas'); blurTmp.width = 960; blurTmp.height = 600;
        blurTmp.getContext('2d').filter = 'blur(4px)';
        blurTmp.getContext('2d').drawImage(charDepthCanvas3D, 0, 0);
        charDepthCtx3D.clearRect(0, 0, 960, 600); charDepthCtx3D.drawImage(blurTmp, 0, 0);
        if (_isMobilePerf) { smoothAndAnchorDepth(charDepthCtx3D, charDepthCanvas3D, true); compressDepthRange(charDepthCtx3D, charDepthCanvas3D, 80, 200); }
        else applyDepthDilation(charDepthCtx3D, charDepthCanvas3D);
        charDepthTexture.needsUpdate = true;
    }

    async function applyAIDepthFromCharImage(img) {
        if (!_aiDepthReady || !_aiDepthEstimator) { _pendingAICharImg = img; return; }
        if (!three3D) { _pendingAICharImg = img; return; }
        const statusEl = document.getElementById('aiStatus3D');
        if (statusEl) { statusEl.style.display = 'block'; statusEl.textContent = 'キャラ AI深度解析中...'; }
        try {
            // キャラ画像をネイティブサイズ（最大512px幅）で AI へ入力
            // → 位置・スケール情報を含まないため、charImageRect 変更時に再投影可能
            const scale = Math.min(1, 512 / img.width);  // モバイルもPCと同解像度（深度品質パリティ化）
            const tmpCvs = document.createElement('canvas');
            tmpCvs.width  = Math.round(img.width  * scale);
            tmpCvs.height = Math.round(img.height * scale);
            tmpCvs.getContext('2d').drawImage(img, 0, 0, tmpCvs.width, tmpCvs.height);
            const result = await _aiDepthEstimator(tmpCvs.toDataURL('image/jpeg', 0.85));
            charAIDepthNativeCanvas = result.depth.toCanvas();  // ネイティブサイズで保持
            positionCharDepth();  // 現在の charImageRect へ投影
            if (statusEl) { statusEl.textContent = '✅ キャラ AI深度完了'; setTimeout(() => { statusEl.style.display = 'none'; }, 1500); }
        } catch (e) { console.warn('AI char depth err:', e); if (statusEl) statusEl.style.display = 'none'; }
    }

    const _d3DBtns = ['btn3DDepth0', 'btn3DDepth05', 'btn3DDepth1', 'btn3DDepth2', 'btn3DDepth3'];
    const _d3DKeys = { btn3DDepth0: '0', btn3DDepth05: '05', btn3DDepth1: '1', btn3DDepth2: '2', btn3DDepth3: '3' };
    _d3DBtns.forEach(id => {
        document.getElementById(id).onclick = () => {
            current3DDepthKey = _d3DKeys[id];
            if (three3D) three3D.material.displacementScale = DISP_SCALE[current3DDepthKey];
            _d3DBtns.forEach(b => document.getElementById(b).classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
    });

    // キャラクター制御スライダー
    function onCharChange() {
        updateCharRect();
        computeCharEdge();
        draw();
        if (charAIDepthNativeCanvas) positionCharDepth();
        else generateSyntheticCharDepth3D();
    }
    document.getElementById('charX').addEventListener('input', e => {
        charState.x = parseInt(e.target.value);
        document.getElementById('charXVal').textContent = charState.x;
        onCharChange();
    });
    document.getElementById('charY').addEventListener('input', e => {
        charState.y = parseInt(e.target.value);
        document.getElementById('charYVal').textContent = charState.y;
        onCharChange();
    });
    document.getElementById('charScale').addEventListener('input', e => {
        charState.scale = parseInt(e.target.value);
        document.getElementById('charScaleVal').textContent = charState.scale + '%';
        onCharChange();
    });
    document.getElementById('charDepthSlider').addEventListener('input', e => {
        charState.depth = parseInt(e.target.value);
        document.getElementById('charDepthVal').textContent = charState.depth;
        updateCharDepth();
        updateCharMesh();
    });

    // キャラ凸（ディスプレースメント）ボタン
    const _charDispBtns = ['btnCharDisp0', 'btnCharDisp05', 'btnCharDisp1', 'btnCharDisp2', 'btnCharDisp3'];
    const _charDispKeys = { btnCharDisp0: '0', btnCharDisp05: '05', btnCharDisp1: '1', btnCharDisp2: '2', btnCharDisp3: '3' };
    _charDispBtns.forEach(id => {
        document.getElementById(id).onclick = () => {
            currentChar3DDepthKey = _charDispKeys[id];
            if (three3D) three3D.charMaterial.displacementScale = DISP_SCALE[currentChar3DDepthKey];
            _charDispBtns.forEach(b => document.getElementById(b).classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
    });

    // BG消去ボタン
    document.getElementById('btnBgClear').onclick = () => {
        baseImage = null; originalImageData = null; posterLayers = []; posterCtxs = [];
        imageRect = { x: 0, y: 0, w: 960, h: 600 };
        maskCtx.clearRect(0, 0, 960, 600);
        rawDepthData3D = null;
        document.getElementById('bgUpload').value = '';  // 同一ファイル再選択を可能にする
        if (three3D) generateSyntheticDepth3D();
        draw();  // updateMask は originalImageData=null で即return するので直接呼ぶ
    };

    // キャラ消去ボタン
    document.getElementById('btnCharClear').onclick = () => {
        charImage = null;
        charAIDepthNativeCanvas = null;
        rawCharDepthData3D = null;
        charCtx.clearRect(0, 0, 960, 600);
        charCanvasEl.style.transform = 'translateZ(0px)';
        document.getElementById('charUpload').value = '';  // 同一ファイル再選択を可能にする
        if (three3D) {
            three3D.charColorTexture.needsUpdate = true;
            generateSyntheticCharDepth3D();
        }
    };

    const threeWrapEl = document.getElementById('threeWrap');
    threeWrapEl.addEventListener('mousemove', handleMove);
    threeWrapEl.addEventListener('mouseleave', handleLeave);
    threeWrapEl.addEventListener('touchmove', handleMove, { passive: true });
    threeWrapEl.addEventListener('touchend', handleLeave);

    // ===== ジャイロスコープ =====
    let gyroEnabled = false, _gyroHoloTs = 0, _gyroRebaseTs = 0;
    function applyGyroTilt(px, py) {
        if (returnAnim) { clearInterval(returnAnim); returnAnim = null; }
        currentTiltX = px; currentTiltY = py;
        if (!is3D) {
            card.style.transition = 'none';
            card.style.transform = 'rotateX(0deg) rotateY(0deg)';
            document.getElementById('cardEdgeTop').style.boxShadow = `inset ${-px * 25}px ${-py * 25}px 40px rgba(255,255,255,0.35), inset 0 0 0 1px rgba(255,255,255,0.15)`;
            card.style.setProperty('--light-angle', `${Math.atan2(py, -px)*(180/Math.PI)}deg`);
            card.style.setProperty('--light-intensity', Math.min(1, Math.sqrt(px*px + py*py)));
            scheduledDraw();
        } else {
            // 3Dモード: scheduledDraw()でテクスチャを更新。
            // メモ: RAF内でdraw()を同期呼びするとフレームバジェットを超えてビクビクになるのでここで呼ぶ。
            // scheduledDrawは_rafPendingフラグでデデュプ済みなので毎イベント呼んでも安全。
            scheduledDraw();
        }
    }
    let _gyroBase = null, _gyroSmooth = { px: 0, py: 0 }, _gyroLastTs = 0;
    let _gyroPrevGamma = 0, _gyroPrevBeta = 0, _gyroStillTs = 0; // 静止検出用
    function rebaseGyro(e) {
        _gyroBase = { beta: e.beta ?? 45, gamma: e.gamma ?? 0 };
        _gyroSmooth = { px: 0, py: 0 };
        _gyroRebaseTs = performance.now();
    }
    function handleGyro(e) {
        if (!gyroEnabled) return;
        const now = performance.now();
        if (now - _gyroLastTs < 33) return;
        _gyroLastTs = now;
        if (!_gyroBase) { rebaseGyro(e); _gyroPrevGamma = e.gamma ?? 0; _gyroPrevBeta = e.beta ?? 45; return; }

        // 静止検出: センサー値の変化量が小さければ静止カウント開始
        const dGamma = Math.abs((e.gamma ?? 0) - _gyroPrevGamma);
        const dBeta  = Math.abs((e.beta ?? 45) - _gyroPrevBeta);
        _gyroPrevGamma = e.gamma ?? 0;
        _gyroPrevBeta  = e.beta ?? 45;
        if (dGamma < 1.0 && dBeta < 1.0) {
            // 静止中: 2秒以上静止したら完全リベース
            if (_gyroStillTs === 0) _gyroStillTs = now;
            if (now - _gyroStillTs > 2000) {
                rebaseGyro(e);
                _gyroStillTs = 0;
                return;
            }
        } else {
            _gyroStillTs = 0; // 動いたらリセット
        }
        const screenAngle = screen.orientation?.angle ?? (typeof window.orientation === 'number' ? window.orientation : 0);
        // iPadは横持ちでもscreenAngle=0を返すことがある → 実際の画面サイズで補正
        const isLandscape = window.innerWidth > window.innerHeight;
        const effectiveAngle = (screenAngle === 0 && isLandscape) ? 90 : screenAngle;
        const gRaw = (e.gamma ?? 0) - _gyroBase.gamma;
        const bRaw = (e.beta  ?? 45) - _gyroBase.beta;
        let rawPx, rawPy;
        if (effectiveAngle === 90) {
            rawPx = clamp( bRaw / 50, -1, 1);
            rawPy = clamp(-gRaw / 50, -1, 1);
        } else if (effectiveAngle === 270 || effectiveAngle === -90) {
            rawPx = clamp(-bRaw / 50, -1, 1);
            rawPy = clamp( gRaw / 50, -1, 1);
        } else if (effectiveAngle === 180) {
            rawPx = clamp(-gRaw / 50, -1, 1);
            rawPy = clamp(-bRaw / 50, -1, 1);
        } else {
            rawPx = clamp(gRaw / 50, -1, 1);
            rawPy = clamp(bRaw / 50, -1, 1);
        }
        // 動きの大きさに応じて可変スムージング
        // 大きく動いた時→素早く追従、小さい動き→ノイズ吸収
        const moveMag = Math.abs(rawPx - _gyroSmooth.px) + Math.abs(rawPy - _gyroSmooth.py);
        const smoothK = gyroEnabled
            ? 0.04 + Math.min(moveMag * 4, 0.46)  // ジャイロ: 0.04〜0.50の可変
            : 0.04;
        _gyroSmooth.px += (rawPx - _gyroSmooth.px) * smoothK;
        _gyroSmooth.py += (rawPy - _gyroSmooth.py) * smoothK;
        const DEAD = 0.018;
        const spx = Math.abs(_gyroSmooth.px) < DEAD ? 0 : _gyroSmooth.px;
        const spy = Math.abs(_gyroSmooth.py) < DEAD ? 0 : _gyroSmooth.py;
        // 旧定期キャリブレーション廃止（静止検出方式に移行）
        if (Math.abs(spx - currentTiltX) < 0.006 && Math.abs(spy - currentTiltY) < 0.006) return;
        applyGyroTilt(spx, spy);
    }
    async function enableGyro() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const perm = await DeviceOrientationEvent.requestPermission();
                if (perm !== 'granted') { alert('ジャイロの許可が必要です'); return; }
            } catch(e) { alert('ジャイロ許可エラー: ' + e); return; }
        }
        gyroEnabled = true;
        _gyroBase = null;         // 次のイベントで基準をリセット
        _gyroSmooth = { px: 0, py: 0 };  // スムージングバッファもリセット
        _gyroLastTs = 0;
        window.addEventListener('deviceorientation', handleGyro, true);
        document.getElementById('btnGyro').classList.add('active');
    }
    function disableGyro() {
        gyroEnabled = false;
        window.removeEventListener('deviceorientation', handleGyro, true);
        document.getElementById('btnGyro').classList.remove('active');
    }
    document.getElementById('btnGyro').onclick = () => gyroEnabled ? disableGyro() : enableGyro();

    // 画面回転時にジャイロ基準をリセット（iPad対応）
    const _handleOrientationChange = () => {
        if (!gyroEnabled) return;
        _gyroBase = null;
        _gyroSmooth = { px: 0, py: 0 };
        _gyroStillTs = 0;
    };
    screen.orientation?.addEventListener('change', _handleOrientationChange);
    window.addEventListener('orientationchange', _handleOrientationChange);

    // ===== フルスクリーンタップ =====
    let isCardFullscreen = false;
    let _fsScaleBackup = 1;
    function toggleCardFullscreen() {
        isCardFullscreen = !isCardFullscreen;
        const body = document.body;
        const scWrap = document.getElementById('scaleWrap');
        const twWrap = document.getElementById('threeWrap');
        const tc = document.getElementById('threeContainer');
        if (isCardFullscreen) {
            body.classList.add('card-fullscreen');
            const maxS = Math.min(window.innerWidth / 480, (window.innerHeight - 20) / 300);
            _fsScaleBackup = maxS;
            if (!is3D) {
                cont.style.transform = `scale(${maxS})`;
                scWrap.style.height = (300 * maxS) + 'px';
            } else {
                if (tc) { tc.style.width = (480 * maxS) + 'px'; tc.style.height = (300 * maxS) + 'px'; }
                twWrap.style.height = (300 * maxS) + 'px';
                if (three3D) {
                    three3D.renderer.setSize(480 * maxS, 300 * maxS); three3D.camera.updateProjectionMatrix();

                }
            }
        } else {
            body.classList.remove('card-fullscreen');
            // 元のスケール設定に戻す
            const activeSBtn = document.querySelector('#btnScale1.active,#btnScale15.active,#btnScale2.active');
            const s = activeSBtn ? parseFloat(activeSBtn.dataset.s || (activeSBtn.id.includes('15') ? 1.5 : activeSBtn.id.includes('2') ? 2 : 1)) : 1;
            cont.style.transform = `scale(${s})`;
            scWrap.style.height = (300 * s) + 'px';
            if (tc) { tc.style.width = (480 * s) + 'px'; tc.style.height = (300 * s) + 'px'; }
            twWrap.style.height = (300 * s) + 'px';
            if (three3D) {
                three3D.renderer.setSize(480 * s, 300 * s); three3D.camera.updateProjectionMatrix();

            }
        }
    }
    // タップ判定（移動量 < 8px かつ 300ms 以内）
    let _tapDown = null;
    const tapTargets = [document.getElementById('scaleWrap'), document.getElementById('threeWrap')];
    tapTargets.forEach(el => {
        el.addEventListener('pointerdown', e => { _tapDown = { x: e.clientX, y: e.clientY, t: Date.now() }; });
        el.addEventListener('pointerup', e => {
            if (!_tapDown) return;
            const dx = Math.abs(e.clientX - _tapDown.x), dy = Math.abs(e.clientY - _tapDown.y), dt = Date.now() - _tapDown.t;
            _tapDown = null;
            if (dx < 8 && dy < 8 && dt < 300) toggleCardFullscreen();
        });
    });

    // ===== 2D/3D トグルボタン =====
    document.getElementById('btnToggle3D').onclick = () => setDisplayMode(!is3D);

    // ===== モバイル自動検出・初期化 =====
    const _isMobile = /iPhone|iPad|iPod|Android|webOS|BlackBerry/i.test(navigator.userAgent) || window.innerWidth < 600;
    _isMobilePerf = _isMobile;  // 描画ループ内のセル数制御に使用

    // モバイルも 3D モードを使用: CSS 3D の辺ガタガタ問題を FXAA で解消
    // WebGL 非対応端末のみ try-catch 内の setDisplayMode(false) でフォールバック
    let is3D = true;

    // 初期表示切り替え（DOM参照ができるここで）
    if (is3D) {
        document.getElementById('scaleWrap').style.display = 'none';
        document.getElementById('threeWrap').style.display = 'flex';
        document.getElementById('btnToggle3D').textContent = '3D';
        document.getElementById('btnToggle3D').classList.add('active');
    } else {
        document.getElementById('scaleWrap').style.display = 'flex';
        document.getElementById('threeWrap').style.display = 'none';
        document.getElementById('btnToggle3D').textContent = '2D';
        document.getElementById('btnToggle3D').classList.remove('active');
    }

    draw();
    autoScaleCard();

    if (is3D) {
        try { init3D(); threeAnimate(); }
        catch(e) { console.warn('3D startup failed:', e); setDisplayMode(false); }
    }

    updateIntensity('2');
</script>
</body>
